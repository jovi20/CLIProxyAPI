services:
  cli-proxy-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api-2
    # env_file:
    #   - .env
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8318:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ./config.yaml:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
    restart: unless-stopped

  # Enable with `docker compose --profile codex-bridge up -d`.
  chat2api:
    profiles:
      - codex-bridge
    image: lanqian528/chat2api:latest
    container_name: chat2api
    ports:
      - "5005:5005"
    environment:
      HISTORY_DISABLED: "true"
      CONVERSATION_ONLY: "false"
      ENABLE_LIMIT: "true"
      RANDOM_TOKEN: "false"
      SCHEDULED_REFRESH: "false"
    restart: unless-stopped
