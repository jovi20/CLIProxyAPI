services:
  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-eceasy/cli-proxy-api:latest}
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: cli-proxy-api
    # env_file:
    #   - .env
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "8317:8317"
      - "8085:8085"
      - "1455:1455"
      - "54545:54545"
      - "51121:51121"
      - "11451:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./config.yaml}:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-./logs}:/CLIProxyAPI/logs
    restart: unless-stopped

  # Enable with `docker compose --profile codex-bridge up -d`
  # or set `COMPOSE_PROFILES=codex-bridge` in `.env`.
  chat2api:
    profiles:
      - codex-bridge
    image: ${CHAT2API_IMAGE:-lanqian528/chat2api:latest}
    container_name: chat2api
    ports:
      - "${CHAT2API_PORT:-5005}:5005"
    environment:
      HISTORY_DISABLED: ${CHAT2API_HISTORY_DISABLED:-true}
      CONVERSATION_ONLY: ${CHAT2API_CONVERSATION_ONLY:-false}
      ENABLE_LIMIT: ${CHAT2API_ENABLE_LIMIT:-true}
      RANDOM_TOKEN: ${CHAT2API_RANDOM_TOKEN:-false}
      SCHEDULED_REFRESH: ${CHAT2API_SCHEDULED_REFRESH:-false}
    restart: unless-stopped
